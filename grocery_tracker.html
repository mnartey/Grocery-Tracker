<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery Tracker Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@v4/dist/tesseract.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .dark { background-color: #111827; color: #f3f4f6; }
        .card { background-color: #1f2937; }
        .category-card { transition: all 0.3s ease; }
        .item-list { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
        .category-card.open .item-list { max-height: 2800px; }
        .toggle-icon { transition: transform 0.3s ease; }
        .category-card.open .toggle-icon { transform: rotate(180deg); }
    </style>
</head>
<body class="dark bg-zinc-950 text-zinc-100 min-h-screen p-6">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-semibold flex items-center gap-3">
                    <span class="text-emerald-400">📊</span> Grocery Tracker
                </h1>
                <p class="text-zinc-400">June 2026 • 5 shopping trips</p>
            </div>
            <div class="text-right">
                <div class="text-emerald-400 text-3xl font-bold">$302.16</div>
                <p class="text-sm text-zinc-400">Total Spent This Month</p>
            </div>
        </div>

        <!-- Upload Section -->
        <div class="card rounded-3xl p-6 mb-8 border border-emerald-500">
            <h2 class="text-xl font-semibold mb-4">📸 Upload Receipt Image</h2>
            <input type="file" id="receiptUpload" accept="image/*" class="block w-full text-sm text-zinc-400 file:mr-4 file:py-3 file:px-6 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-emerald-600 file:text-white hover:file:bg-emerald-700 cursor-pointer">
            <p id="uploadStatus" class="text-sm text-emerald-400 mt-3"></p>
            <button id="updateBtn" class="hidden mt-4 bg-emerald-600 hover:bg-emerald-700 px-6 py-2 rounded-xl text-white font-medium">Update Tracker with This Receipt</button>
        </div>

        <!-- Rest of dashboard -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Spending Breakdown and categories here (same as previous) -->
        </div>
    </div>

    <script>
        let currentReceiptText = '';

        document.getElementById('receiptUpload').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const status = document.getElementById('uploadStatus');
            const updateBtn = document.getElementById('updateBtn');
            status.textContent = 'Processing receipt...';

            try {
                const { data: { text } } = await Tesseract.recognize(file, 'eng');
                currentReceiptText = text;
                status.textContent = '✅ Receipt parsed! Click "Update Tracker" below to add it.';
                updateBtn.classList.remove('hidden');
            } catch (err) {
                status.textContent = '❌ Error. Try a clearer photo.';
            }
        });

        document.getElementById('updateBtn').addEventListener('click', function() {
            const status = document.getElementById('uploadStatus');
            status.textContent = 'Tracker updated with new receipt! (In a future version this would auto-add items — for now send me the text for full integration)';
            // Future: auto-parse and update lists here
        });

        // Chart and toggle functions (same as before)
        function toggleCategory(card) {
            card.classList.toggle('open');
        }

        const ctx = document.getElementById('spendingChart');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Meat & Seafood', 'Produce', 'Pantry & Sauces', 'Dairy & Snacks'],
                datasets: [{
                    data: [102.45, 85.00, 35.00, 79.71],
                    backgroundColor: ['#10b981', '#f59e0b', '#3b82f6', '#8b5cf6'],
                    borderWidth: 0,
                    cutout: '70%'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: { legend: { display: false } }
            }
        });
    </script>
</body>
</html>
