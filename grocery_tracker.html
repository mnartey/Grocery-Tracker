<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛒 Mike's Grocery Tracker - June 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; background: #18181b; color: #f4f4f5; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }
        .receipt-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .receipt-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
        .scroll-container { max-height: 420px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #4b5563 #27272a; }
        .category-card { transition: all 0.2s ease; }
        .category-header { cursor: pointer; }
        .expand-icon { transition: transform 0.3s ease; }
        .expanded .expand-icon { transform: rotate(180deg); }
        .category-details { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; }
        .expanded .category-details { max-height: 800px; }
    </style>
</head>
<body class="min-h-screen">
    <div class="max-w-6xl mx-auto p-8">
        <div class="flex justify-between mb-10">
            <div>
                <h1 class="title-font text-5xl font-semibold tracking-tighter text-emerald-400">Grocery Tracker</h1>
                <p class="text-zinc-400">June 2026 • Lidl Garwood, NJ</p>
            </div>
            <div class="text-right">
                <div class="text-6xl font-semibold text-white" id="total">$87.18</div>
                <p class="text-emerald-400 text-sm font-medium">MONTHLY TOTAL</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Breakdown -->
            <div class="lg:col-span-7 bg-zinc-900 rounded-3xl p-8">
                <h2 class="text-2xl font-semibold mb-8">📊 Spending Breakdown</h2>
                <div class="mb-8" style="height: 320px;">
                    <canvas id="categoryChart"></canvas>
                </div>
                <div id="categories" class="space-y-4"></div>
            </div>

            <!-- Receipts -->
            <div class="lg:col-span-5 bg-zinc-900 rounded-3xl p-8">
                <h2 class="text-2xl font-semibold mb-6">Recent Receipts</h2>
                <div class="scroll-container space-y-6">
                    <!-- June 2 and June 3 cards here (same as before) -->
                </div>
            </div>
        </div>
    </div>

</html>
